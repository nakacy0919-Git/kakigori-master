<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>究極のふわふわ かき氷職人</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-stone-900 text-stone-100 overflow-hidden w-screen h-screen relative font-japanese select-none touch-none">

    <!-- サウンドアセット -->
    <audio id="shave-sound" src="assets/shave.mp3" loop preload="auto"></audio>
    <audio id="bgm-sound" src="assets/bgm.mp3" loop preload="auto"></audio>

    <!-- BGMトグルボタン -->
    <button id="bgm-toggle-btn" class="fixed top-6 right-6 z-[100] w-14 h-14 rounded-full glass-panel flex items-center justify-center text-white/80 hover:text-white transition-all transform active:scale-95 shadow-[0_0_15px_rgba(0,0,0,0.5)] border border-white/20">
        <svg id="icon-sound-on" class="w-7 h-7 hidden drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M11 5L6 9H2v6h4l5 4V5z"></path>
        </svg>
        <svg id="icon-sound-off" class="w-7 h-7 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path>
        </svg>
    </button>

    <!-- 背景装飾 -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 via-stone-900 to-black pointer-events-none -z-30"></div>
    <div class="absolute bottom-0 left-0 right-0 h-1/4 bg-gradient-to-t from-slate-900 to-slate-800 border-t-4 border-slate-600 pointer-events-none -z-20 shadow-[inset_0_20px_50px_rgba(0,0,0,0.8)]"></div>

    <canvas id="gameCanvas" class="absolute inset-0 z-0"></canvas>

    <!-- ゲーム中UIレイヤー -->
    <div id="ui-layer" class="absolute inset-0 flex flex-row justify-between items-stretch p-6 z-10 pointer-events-none hidden transition-opacity duration-500">
        
        <!-- 左手エリア -->
        <div class="w-1/3 max-w-sm flex flex-col justify-end pb-8 pointer-events-auto">
            <div id="rotation-pad" class="w-full h-64 rounded-[2rem] glass-panel flex flex-col items-center justify-center relative touch-pan-x active:scale-[0.98] transition-transform shadow-2xl border-white/20">
                <div class="absolute top-6 text-white/50 text-xs tracking-[0.4em] font-bold uppercase">Bowl Rotation</div>
                <div class="relative flex items-center justify-center w-full mt-4">
                    <svg class="w-8 h-8 text-white/30 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
                    <div class="w-40 h-12 mx-4 bg-white/5 rounded-full border border-white/10 relative overflow-hidden flex items-center justify-center shadow-inner">
                        <div class="swipe-glow absolute left-0 w-16 h-full bg-gradient-to-r from-transparent via-cyan-200/40 to-transparent skew-x-[-20deg]"></div>
                        <span class="text-white/60 text-sm tracking-[0.2em] font-bold">SWIPE</span>
                    </div>
                    <svg class="w-8 h-8 text-white/30 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                </div>
                <div class="absolute bottom-8 text-cyan-50 text-sm text-center font-bold tracking-widest drop-shadow-md">
                    左右にスワイプして<br><span class="text-xs text-stone-400 mt-1 block">バランスを整える</span>
                </div>
            </div>
        </div>

        <!-- 中央エリア (水平測定器) -->
        <div class="w-1/3 flex flex-col items-center pt-2">
            <div class="w-full max-w-md flex flex-col items-center gap-4 glass-panel p-5 rounded-2xl border-t border-white/20 shadow-2xl">
                <div class="flex justify-between w-full px-2 text-xl font-bold text-cyan-100">
                    <div id="status-text" class="tracking-widest">山の重心を保て</div>
                    <div id="volume-text" class="font-mono text-cyan-300">Vol: 0</div>
                </div>
                <div class="w-full bg-black/90 rounded-full h-8 border-2 border-stone-600 overflow-hidden relative shadow-[inset_0_5px_10px_rgba(0,0,0,0.8)] flex items-center">
                    <div class="absolute left-1/2 transform -translate-x-1/2 w-16 h-full bg-emerald-900/40 border-l border-r border-emerald-500/50 z-0"></div>
                    <div class="absolute left-1/2 transform -translate-x-1/2 w-0.5 h-full bg-white/30 z-0"></div>
                    <div id="balance-bubble" class="absolute w-6 h-6 rounded-full bg-gradient-to-br from-emerald-300 to-emerald-500 shadow-[0_0_10px_rgba(52,211,153,0.8)] top-1/2 transform -translate-y-1/2 -translate-x-1/2 left-1/2 transition-all duration-75 ease-out z-10 border border-white/50"></div>
                </div>
            </div>
            
            <div id="collapse-warning" class="mt-40 text-8xl font-black text-red-500 drop-shadow-[0_0_40px_rgba(255,0,0,1)] opacity-0 transition-opacity duration-300 pointer-events-none rotate-[-5deg] tracking-tighter">
                崩 落
            </div>
        </div>

        <!-- 右手エリア -->
        <div class="w-1/3 max-w-sm flex flex-col justify-end items-end pb-8 gap-8 pointer-events-auto">
            <button id="finish-btn" class="px-10 py-5 bg-gradient-to-b from-blue-500 to-indigo-700 text-white rounded-full font-bold text-2xl shadow-[0_10px_20px_rgba(0,0,0,0.5)] border border-blue-400 active:scale-95 transition-all tracking-widest w-full max-w-[280px]">
                完成させる
            </button>
            <button id="shave-btn" class="shave-btn-base w-48 h-48 rounded-full bg-gradient-to-br from-red-600 to-red-900 border-4 border-red-950 flex flex-col items-center justify-center text-white select-none outline-none z-20">
                <span class="text-6xl font-black drop-shadow-lg mb-2 tracking-widest">削る</span>
                <span class="text-lg font-bold text-red-200 uppercase tracking-[0.1em]">Hold to Shave</span>
            </button>
        </div>
    </div>

    <!-- スタート画面 (暖簾アニメーション) -->
    <div id="start-screen" class="absolute inset-0 bg-stone-950 flex flex-col items-center justify-start pointer-events-auto z-50 transition-opacity duration-1000 overflow-hidden">
        <div class="relative w-full h-1/2 max-w-5xl mx-auto mt-0 perspective-[1200px] z-30">
            <div class="absolute top-0 left-[-5%] w-[110%] h-8 bg-gradient-to-b from-[#78350f] via-[#451a03] to-[#201005] rounded-full shadow-2xl z-20"></div>
            <div id="noren-container" class="flex w-full h-full pt-4 px-4 gap-2 z-10">
                <div class="noren-panel flex-1 bg-indigo-950 shadow-[5px_10px_25px_rgba(0,0,0,0.8)] border-b-[16px] border-indigo-900 relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-r from-black/50 via-transparent to-black/30"></div>
                </div>
                <div class="noren-panel flex-1 bg-indigo-950 shadow-[5px_10px_25px_rgba(0,0,0,0.8)] border-b-[16px] border-indigo-900 relative overflow-hidden flex flex-col items-center justify-center">
                    <div class="absolute inset-0 bg-gradient-to-r from-black/30 via-transparent to-black/30 z-10 pointer-events-none"></div>
                    <img src="assets/logo.png" alt="かき氷職人ロゴ" class="w-11/12 h-auto opacity-90 mix-blend-screen z-0 drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] mt-8" onerror="this.style.display='none'">
                </div>
                <div class="noren-panel flex-1 bg-indigo-950 shadow-[5px_10px_25px_rgba(0,0,0,0.8)] border-b-[16px] border-indigo-900 relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-r from-black/30 via-transparent to-black/50"></div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center w-full z-20 -mt-16">
            <h2 class="cinematic-text text-xl md:text-2xl text-cyan-200 font-bold mb-8 drop-shadow-[0_0_15px_rgba(0,255,255,0.6)] opacity-0">ようこそ、かき氷の世界へ</h2>
            <h1 class="text-5xl md:text-7xl mb-12 tracking-[0.2em] text-transparent bg-clip-text bg-gradient-to-b from-white via-stone-200 to-stone-500 drop-shadow-[0_10px_20px_rgba(0,0,0,1)] text-center leading-tight font-black ml-4">
                かき氷職人<br>
                <span class="text-xl md:text-2xl font-bold tracking-[0.6em] mt-6 block text-white/50 ml-2">iPad専用体験</span>
            </h1>
            <button id="start-btn" class="relative overflow-hidden group bg-white text-stone-950 font-black py-5 px-24 rounded-full shadow-[0_0_40px_rgba(255,255,255,0.15)] transition-all duration-300 transform hover:scale-105 active:scale-95 text-2xl tracking-[0.3em] border border-stone-400">
                <span class="relative z-10 ml-2">暖簾をくぐる</span>
                <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-cyan-200 to-blue-300 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-0 mix-blend-multiply"></div>
            </button>
        </div>
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom,_var(--tw-gradient-stops))] from-blue-900/20 via-stone-950 to-stone-950 z-0 pointer-events-none"></div>
    </div>

    <!-- リザルト画面 -->
    <div id="result-screen" class="absolute inset-0 bg-stone-950/90 flex items-center justify-center pointer-events-none opacity-0 backdrop-blur-xl z-50 transition-opacity duration-700">
        <div class="glass-panel p-10 rounded-[2.5rem] border border-white/20 text-center max-w-md w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-700 relative overflow-hidden" id="result-modal">
            <div id="penalty-stamp" class="absolute top-6 right-6 text-red-500 font-black text-4xl border-8 border-red-500 rounded-lg p-2 rotate-12 opacity-0 drop-shadow-lg">崩落</div>
            <h2 class="text-2xl text-stone-400 mb-2 tracking-widest font-bold">最終査定</h2>
            <div class="text-9xl font-black mb-2 drop-shadow-[0_0_30px_rgba(255,255,255,0.5)]" id="rank-display">S</div>
            <div class="text-2xl text-white mb-8 font-bold tracking-widest" id="syrup-name">究極 宇治抹茶</div>
            <div class="space-y-4 text-stone-300 text-left mb-10 text-xl bg-black/30 p-6 rounded-2xl">
                <div class="flex justify-between items-center border-b border-stone-700/50 pb-2"><span>ボリューム</span><span id="score-vol" class="font-bold text-white font-mono">--</span></div>
                <div class="flex justify-between items-center border-b border-stone-700/50 pb-2"><span>高さ</span><span id="score-height" class="font-bold text-white font-mono">--</span></div>
                <div class="flex justify-between items-center border-b border-stone-700/50 pb-2"><span>造形美</span><span id="score-balance" class="font-bold text-white font-mono">--</span></div>
                <div class="flex justify-between items-center pt-4 text-2xl text-stone-100"><span>総合得点</span><span id="score-total" class="font-black text-4xl text-amber-400 font-mono">--</span></div>
            </div>
            <button id="retry-btn" class="bg-stone-800 text-white border border-stone-600 font-bold py-5 px-8 rounded-full shadow-lg transition transform active:scale-95 w-full text-2xl tracking-widest pointer-events-none">もう一度挑む</button>
        </div>
    </div>

    <!-- モジュールとしてJSを読み込む -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
