<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>究極のふわふわ かき氷職人</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-stone-900 text-stone-100 overflow-hidden w-screen h-screen relative font-japanese select-none touch-none">

    <!-- サウンドアセット -->
    <audio id="shave-sound" src="assets/shave.mp3" loop preload="auto"></audio>

    <!-- 背景装飾 (厨房のステンレスや光の反射をイメージしたグラデーション) -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-700 via-stone-900 to-black pointer-events-none -z-30"></div>
    <!-- カウンター -->
    <div class="absolute bottom-0 left-0 right-0 h-1/4 bg-gradient-to-t from-slate-900 to-slate-800 border-t-4 border-slate-600 pointer-events-none -z-20 shadow-[inset_0_20px_50px_rgba(0,0,0,0.8)]"></div>

    <!-- ゲームキャンバス -->
    <canvas id="gameCanvas" class="absolute inset-0 z-0"></canvas>

    <!-- UIレイヤー (iPad横向き特化の左右分割レイアウト) -->
    <div id="ui-layer" class="absolute inset-0 flex flex-row justify-between items-stretch p-6 z-10 pointer-events-none hidden transition-opacity duration-500">
        
        <!-- 左手エリア：器の回転 -->
        <div class="w-1/3 max-w-sm flex flex-col justify-end pb-8 pointer-events-auto">
            <div id="rotation-pad" class="w-full h-64 rounded-[2rem] glass-panel flex flex-col items-center justify-center relative touch-pan-x active:scale-[0.98] transition-transform">
                <div class="absolute top-6 text-stone-300 text-xl tracking-widest font-bold drop-shadow-md">器を回す</div>
                <div class="text-7xl text-white/40 flex items-center gap-4 animate-pulse">
                    <span>⬅️</span><span>👆</span><span>➡️</span>
                </div>
                <div class="absolute bottom-6 text-stone-300 text-sm text-center font-bold">左手でスワイプ<br>形を整える</div>
            </div>
        </div>

        <!-- 中央エリア：上部にステータス -->
        <div class="w-1/3 flex flex-col items-center pt-2">
            <div class="w-full max-w-md flex flex-col items-center gap-3 glass-panel p-4 rounded-2xl border-t border-white/20">
                <div class="flex justify-between w-full px-4 text-xl font-bold text-cyan-100">
                    <div id="status-text" class="tracking-widest">氷を美しく積み上げろ</div>
                    <div id="volume-text" class="font-mono text-cyan-300">Vol: 0</div>
                </div>
                <div class="w-full bg-black/80 rounded-full h-5 border border-white/10 overflow-hidden relative shadow-inner">
                    <div id="stability-bar" class="h-full bg-emerald-400 w-full transition-all duration-200 ease-out origin-left"></div>
                    <div class="absolute inset-0 flex items-center justify-center text-white/90 text-xs tracking-widest font-bold mix-blend-difference">崩壊危険度</div>
                </div>
            </div>
            
            <!-- 崩落警告表示 -->
            <div id="collapse-warning" class="mt-32 text-8xl font-black text-red-500 drop-shadow-[0_0_40px_rgba(255,0,0,1)] opacity-0 transition-opacity duration-300 pointer-events-none rotate-[-5deg] tracking-tighter">
                崩 落
            </div>
        </div>

        <!-- 右手エリア：削る＆完成ボタン -->
        <div class="w-1/3 max-w-sm flex flex-col justify-end items-end pb-8 gap-8 pointer-events-auto">
            <button id="finish-btn" class="px-10 py-5 bg-gradient-to-b from-blue-500 to-indigo-700 text-white rounded-full font-bold text-2xl shadow-[0_10px_20px_rgba(0,0,0,0.5)] border border-blue-400 active:scale-95 transition-all tracking-widest w-full max-w-[280px]">
                完成させる
            </button>
            <button id="shave-btn" class="shave-btn-base w-48 h-48 rounded-full bg-gradient-to-br from-red-500 to-red-800 border-4 border-red-950 flex flex-col items-center justify-center text-white select-none outline-none z-20">
                <span class="text-6xl font-black drop-shadow-lg mb-2 tracking-widest">削る</span>
                <span class="text-lg font-bold text-red-200 uppercase tracking-widest">Hold to Shave</span>
            </button>
        </div>
    </div>

    <!-- スタート画面・リザルト画面は既存のまま（クラス微調整のみ） -->
    <!-- ... (前回のスタート画面・リザルト画面のコードをそのまま配置) ... -->
    <div id="start-screen" class="absolute inset-0 bg-stone-950/95 flex flex-col items-center justify-center pointer-events-auto z-50 transition-opacity duration-500 backdrop-blur-lg">
        <h1 class="text-6xl md:text-8xl mb-8 tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-white to-cyan-200 drop-shadow-[0_0_30px_rgba(0,255,255,0.3)] text-center leading-tight font-black">
            かき氷職人<br><span class="text-3xl md:text-4xl font-normal tracking-[0.5em] mt-4 block text-white">iPad専用体験</span>
        </h1>
        <button id="start-btn" class="bg-white text-stone-900 font-black py-5 px-20 rounded-full shadow-[0_0_30px_rgba(255,255,255,0.3)] transition transform hover:scale-105 active:scale-95 text-2xl tracking-widest mt-8">
            暖簾をくぐる
        </button>
    </div>

    <!-- リザルト画面 -->
    <div id="result-screen" class="absolute inset-0 bg-stone-950/90 flex items-center justify-center pointer-events-none opacity-0 backdrop-blur-xl z-50 transition-opacity duration-700">
        <div class="glass-panel p-10 rounded-[2.5rem] border border-white/20 text-center max-w-md w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-700 relative overflow-hidden" id="result-modal">
            <h2 class="text-2xl text-stone-400 mb-2 tracking-widest font-bold">最終査定</h2>
            <div class="text-9xl font-black mb-2 drop-shadow-[0_0_30px_rgba(255,255,255,0.5)]" id="rank-display">S</div>
            <div class="text-2xl text-white mb-8 font-bold tracking-widest" id="syrup-name">究極 宇治抹茶</div>
            
            <div class="space-y-4 text-stone-300 text-left mb-10 text-xl bg-black/30 p-6 rounded-2xl">
                <div class="flex justify-between items-center border-b border-stone-700/50 pb-2">
                    <span>ボリューム</span><span id="score-vol" class="font-bold text-white font-mono">--</span>
                </div>
                <div class="flex justify-between items-center border-b border-stone-700/50 pb-2">
                    <span>高さ</span><span id="score-height" class="font-bold text-white font-mono">--</span>
                </div>
                <div class="flex justify-between items-center border-b border-stone-700/50 pb-2">
                    <span>造形美 (バランス)</span><span id="score-balance" class="font-bold text-white font-mono">--</span>
                </div>
                <div class="flex justify-between items-center pt-4 text-2xl text-stone-100">
                    <span>総合得点</span><span id="score-total" class="font-black text-4xl text-amber-400 font-mono">--</span>
                </div>
            </div>
            
            <button id="retry-btn" class="bg-stone-800 text-white border border-stone-600 font-bold py-5 px-8 rounded-full shadow-lg transition transform active:scale-95 w-full text-2xl tracking-widest pointer-events-none">
                もう一度挑む
            </button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
